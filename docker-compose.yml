version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cronos_fichajes_app
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      EXTERNAL_DATABASE_URL: ${EXTERNAL_DATABASE_URL:-}
      DATABASE_URL: ${DATABASE_URL:-}
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN es obligatorio}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET es obligatorio}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET es obligatorio}
      KIOSK_KEY: ${KIOSK_KEY:?KIOSK_KEY es obligatorio}
      EXPECTED_DAILY_MINUTES: ${EXPECTED_DAILY_MINUTES:-480}
      OVERTIME_MIN_THRESHOLD: ${OVERTIME_MIN_THRESHOLD:-15}
      GEO_DECIMALS: ${GEO_DECIMALS:-4}
    volumes:
      - ./backups:/backups
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
