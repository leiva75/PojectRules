version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: pointeuse-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: pointeuse
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: pointeuse
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pointeuse"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pointeuse-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://pointeuse:${DB_PASSWORD:-changeme}@db:5432/pointeuse
      SESSION_SECRET: ${SESSION_SECRET:-change-this-in-production}
    ports:
      - "5000:5000"

volumes:
  postgres_data:
